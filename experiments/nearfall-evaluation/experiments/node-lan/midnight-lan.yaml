    # --- Indexer (connected to node-1) ---
    - name: indexer
      image: docker.io/midnightntwrk/indexer-standalone:4.0.1
      env:
        - name: APP__APPLICATION__NETWORK_ID
          value: undeployed
        - name: APP__INFRA__SECRET
          # Should match node-1's node key (hex content of node-1/key)
          value: "c24711b7def7e81909a2a810257682688980f51d42d2c706447c3355d824f400"
        - name: APP__INFRA__NODE__URL
          value: ws://localhost:9945
        - name: RUST_LOG
          value: indexer=info,chain_indexer=info,indexer_api=info,wallet_indexer=info,indexer_common=info,fastrace_opentelemetry=info,info
      ports:
        - containerPort: 8088
          hostPort: 8088
      volumeMounts:
        - mountPath: /data
          name: data-index

    # --- Proof server ---
    - name: proofserver
      image: docker.io/midnightntwrk/proof-server:8.0.3
      args:
        - --
        - midnight-proof-server
        - -v
      ports:
        - containerPort: 6300
          hostPort: 6300

    # --- BEEFY key inserter (exits after inserting keys into all 7 nodes) ---
    - name: beefy-inserter
      image: docker.io/curlimages/curl:latest
      command:
        - /bin/sh
        - -c
      args:
        - |
          wait_for_rpc() {
            port="$1"
            until curl -sS -H 'Content-Type: application/json' -X POST \
              -d '{"jsonrpc":"2.0","id":1,"method":"system_health","params":[]}' \
              "http://127.0.0.1:$port" > /dev/null 2>&1; do
              sleep 1
            done
          }

          insert_beefy_key() {
            port="$1"
            keydir="$2"
            seed=$(sed -n '/Secret seed/{s/^  Secret seed:       \(.*\)$/\1/;p}' "$keydir/beefy.keygen")
            pubkey=$(sed -n '/Public key (hex)/{s/^  Public key (hex):  \(.*\)$/\1/;p}' "$keydir/beefy.keygen")
            curl -sS -H 'Content-Type: application/json' -X POST \
              -d "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"author_insertKey\",\"params\":[\"beef\",\"$seed\",\"$pubkey\"]}" \
              "http://127.0.0.1:$port"
            echo "BEEFY key inserted for node at port $port"
          }

          for n in 1 2 3 4 5 6 7; do (
            port=$((9944 + n))
            wait_for_rpc "$port"
            sleep 10
            insert_beefy_key "$port" "/keys/$n"
          ) & done
          wait
      volumeMounts:
        - mountPath: /keys/1
          name: keys-node-1
          readOnly: false
        - mountPath: /keys/2
          name: keys-node-2
          readOnly: false
        - mountPath: /keys/3
          name: keys-node-3
          readOnly: false
        - mountPath: /keys/4
          name: keys-node-4
          readOnly: false
        - mountPath: /keys/5
          name: keys-node-5
          readOnly: false
        - mountPath: /keys/6
          name: keys-node-6
          readOnly: false
        - mountPath: /keys/7
          name: keys-node-7
          readOnly: false

