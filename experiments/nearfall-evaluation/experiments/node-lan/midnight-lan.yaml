        - /ip4/127.0.0.1/tcp/30334/p2p/12D3KooWB7c5RRVAtn98WkQTCPHjasNuVNnjNaFpEaQLsmTUaeuc
        - --port
        - "30335"
        - --rpc-port
        - "9946"
        - --rpc-methods=Unsafe
        - --rpc-external
