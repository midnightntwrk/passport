# Podman Kubernetes YAML — Midnight node LAN (7-node dev network)
# Usage:
#   podman kube play midnight-node-lan.yaml
#   podman kube down midnight-node-lan.yaml   # to stop
#
# Prerequisites:
#   mkdir -p data/node-{1..7} data/index
#
# Node 1 peer ID (from chain-spec.json; verify with `cat node-1/identity`):
#   12D3KooWB7c5RRVAtn98WkQTCPHjasNuVNnjNaFpEaQLsmTUaeuc
#
# Note: CFG_PRESET=dev enables use_main_chain_follower_mock. If the dev.toml
# args (including --dev) conflict with --chain, set CFG_PRESET to a different
# value or adjust the entrypoint configuration accordingly.
#
# The indexer APP__INFRA__SECRET should match node-1's NODE_KEY (hex content
# of node-1/key).
apiVersion: v1
kind: Pod
metadata:
  name: midnight-lan
spec:
  restartPolicy: Never
  containers:

    # --- Node 1 (bootnode) ---
    - name: node-1
      image: docker.io/bwbush/midnight-node:0.22.2-patched
      args:
        - --chain
        - /chain-spec-raw.json
        - --state-pruning
        - archive
        - --blocks-pruning
        - archive
        - --port
        - "30334"
        - --rpc-port
        - "9945"
        - --rpc-methods=Unsafe
        - --rpc-external
        - --rpc-cors
        - all
        - --log
        - aura=trace,grandpa=trace,beefy=trace,afg=trace,babe=trace
      env:
        - name: CFG_PRESET
          value: dev
        - name: BASE_PATH
          value: /data
        - name: VALIDATOR
          value: "true"
        - name: NODE_KEY_FILE
          value: /keys/key
        - name: AURA_SEED_FILE
          value: /keys/aura.seed
        - name: GRANDPA_SEED_FILE
          value: /keys/grandpa.seed
        - name: BEEFY_SEED_FILE
          value: /keys/beefy.seed
        - name: CROSS_CHAIN_SEED_FILE
          value: /keys/beefy.seed
      ports:
        - containerPort: 9945
          hostPort: 9945
        - containerPort: 30334
          hostPort: 30334
      volumeMounts:
        - mountPath: /data
          name: data-node-1
        - mountPath: /keys
          name: keys-node-1
          readOnly: true
        - mountPath: /chain-spec-raw.json
          name: chain-spec
          readOnly: true

